<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DynamoHive Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
background:#0B0F19;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

nav{
background:#05080F;
padding:15px;
text-align:center;
}

nav a{
color:#00F0FF;
margin:0 15px;
text-decoration:none;
font-size:14px;
}

header{
padding:40px;
text-align:center;
border-bottom:1px solid #1f2937;
}

h1{
color:#00F0FF;
margin:0;
}

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
gap:25px;
}

.panel{
background:#111827;
padding:25px;
border-radius:10px;
}

.panel h2{
color:#00FF9C;
margin-top:0;
}

.signal{
padding:10px 0;
border-bottom:1px solid #1f2937;
}

#map{
height:400px;
border-radius:8px;
}

footer{
padding:30px;
text-align:center;
color:#777;
border-top:1px solid #1f2937;
margin-top:40px;
}

</style>

</head>

<body>

<nav>
<a href="/">Home</a>
<a href="/dashboard">Dashboard</a>
<a href="/feed">Feed</a>
<a href="/signals">Signals</a>
<a href="/about">About</a>
</nav>

<header>

<h1>DynamoHive Intelligence Dashboard</h1>
<p>Global Signal Monitoring</p>

</header>

<div class="container">

<div class="grid">

<div class="panel">

<h2>Global Signal Map</h2>

<div id="map"></div>

</div>

<div class="panel">

<h2>Signal Feed</h2>

<div id="signal-list">
Loading signals...
</div>

</div>

</div>

</div>

<footer>

DynamoHive Intelligence System

</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:5
}
).addTo(map);

async function loadSignals(){

const res = await fetch("/signals");
const data = await res.json();

const container = document.getElementById("signal-list");
container.innerHTML="";

(data.signals || []).forEach((signal,i)=>{

const div=document.createElement("div");
div.className="signal";
div.innerText=signal.title || JSON.stringify(signal);

container.appendChild(div);

const lat = signal.lat || (Math.random()*140-70);
const lon = signal.lon || (Math.random()*360-180);

L.marker([lat,lon])
.addTo(map)
.bindPopup(signal.title || "Signal");

});

}

loadSignals();

</script>

</body>
</html>
