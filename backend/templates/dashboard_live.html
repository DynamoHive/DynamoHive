<!DOCTYPE html>
<html>
<head>
    <title>DynamoHive Intelligence</title>

    <style>
        body {
            background:#0B0F19;
            color:white;
            font-family:Arial;
            padding:20px;
        }

        h1 {
            color:#00F0FF;
        }

        .card {
            background:#111827;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

        .title {
            color:#00FF9C;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<h1>🧠 DynamoHive Intelligence Panel</h1>

<div class="card">
    <div class="title">SYSTEM</div>
    <div id="system">loading...</div>
</div>

<div class="card">
    <div class="title">DOMINANCE</div>
    <div id="dominance">loading...</div>
</div>

<div class="card">
    <div class="title">ANOMALIES</div>
    <div id="anomalies">loading...</div>
</div>

<script>

async function load() {

    try {

        const res = await fetch("/metrics");
        const data = await res.json();

        const o = data.orchestrator || {};

        document.getElementById("system").innerHTML = `
            cycles: ${o.cycle_count || 0} <br>
            duration: ${o.last_duration || 0}s <br>
            signals: ${o.last_signal_count || 0} <br>
            events: ${o.last_event_count || 0}
        `;

        document.getElementById("dominance").innerHTML =
            (o.dominance || []).map(d =>
                `${d.topic} → ${d.dominance}`
            ).join("<br>") || "no data";

        document.getElementById("anomalies").innerHTML =
            (o.anomalies || []).map(a =>
                `${a.type} → ${a.topic}`
            ).join("<br>") || "no anomalies";

    } catch (e) {

        document.getElementById("system").innerHTML = "error loading metrics";
        document.getElementById("dominance").innerHTML = "-";
        document.getElementById("anomalies").innerHTML = "-";

    }
}

// 🔥 ilk yükleme
load()

// 🔥 sürekli güncelle
setInterval(load, 2000);

</script>

</body>
</html>
