<!DOCTYPE html>
<html>
<head>
    <title>DynamoHive Intelligence</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background:#0B0F19;
            color:white;
            font-family:Arial;
            padding:20px;
        }

        h1 {
            color:#00F0FF;
        }

        .card {
            background:#111827;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

        .title {
            color:#00FF9C;
            margin-bottom:10px;
        }

        canvas {
            background:#0f172a;
            padding:10px;
            border-radius:10px;
        }
    </style>
</head>
<body>

<h1>🧠 DynamoHive Intelligence Panel</h1>

<div class="card">
    <div class="title">SYSTEM</div>
    <div id="system"></div>
</div>

<div class="card">
    <div class="title">DOMINANCE GRAPH</div>
    <canvas id="dominanceChart"></canvas>
</div>

<div class="card">
    <div class="title">ANOMALIES</div>
    <div id="anomalies"></div>
</div>

<script>

let chart;

async function load() {

    try {

        const res = await fetch("/metrics");
        const data = await res.json();
        const o = data.orchestrator || {};

        // SYSTEM
        document.getElementById("system").innerHTML = `
            cycles: ${o.cycle_count || 0} <br>
            signals: ${o.last_signal_count || 0} <br>
            events: ${o.last_event_count || 0}
        `;

        // DOMINANCE GRAPH
        const labels = (o.dominance || []).map(d => d.topic);
        const values = (o.dominance || []).map(d => d.dominance);

        if (!chart) {
            const ctx = document.getElementById("dominanceChart");

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Dominance",
                        data: values
                    }]
                }
            });

        } else {
            chart.data.labels = labels;
            chart.data.datasets[0].data = values;
            chart.update();
        }

        // ANOMALIES
        document.getElementById("anomalies").innerHTML =
            (o.anomalies || []).map(a =>
                `${a.type} → ${a.topic}`
            ).join("<br>") || "no anomalies";

    } catch (e) {
        console.error(e);
    }
}

// first load
load()

// live refresh
setInterval(load, 2000);

</script>

</body>
</html>
