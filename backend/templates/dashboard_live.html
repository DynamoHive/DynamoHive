<!DOCTYPE html>
<html>
<head>
    <title>DynamoHive GOD MODE</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background:#05080F;
            color:white;
            font-family:Arial;
            padding:20px;
        }

        h1 {
            color:#00F0FF;
        }

        .grid {
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:20px;
        }

        .card {
            background:#111827;
            padding:20px;
            border-radius:10px;
        }

        .title {
            color:#00FF9C;
            margin-bottom:10px;
        }

        button {
            padding:10px;
            margin-top:10px;
            background:#00F0FF;
            border:none;
            cursor:pointer;
        }

        input {
            padding:8px;
            width:100%;
            margin-top:5px;
        }
    </style>
</head>
<body>

<h1>⚡ DynamoHive GOD MODE</h1>

<div class="card">
    <div class="title">SYSTEM</div>
    <div id="system"></div>
</div>

<div class="grid">

    <div class="card">
        <div class="title">DOMINANCE</div>
        <canvas id="dominanceChart"></canvas>
    </div>

    <div class="card">
        <div class="title">TREND</div>
        <canvas id="trendChart"></canvas>
    </div>

</div>

<div class="grid">

    <div class="card">
        <div class="title">ANOMALIES</div>
        <div id="anomalies"></div>
    </div>

    <div class="card">
        <div class="title">TOP SIGNAL</div>
        <div id="top"></div>
    </div>

</div>

<div class="grid">

    <div class="card">
        <div class="title">EVENT INJECTOR</div>

        <input id="topic" placeholder="topic (ai / war / etc)">
        <input id="type" placeholder="type (click / like / skip)">
        <button onclick="sendEvent()">SEND EVENT</button>

    </div>

    <div class="card">
        <div class="title">LIVE FLOW</div>
        <div id="flow"></div>
    </div>

</div>

<script>

let dominanceChart;
let trendChart;
let trendData = [];

async function load() {

    const res = await fetch("/metrics");
    const data = await res.json();
    const o = data.orchestrator || {};

    // SYSTEM
    document.getElementById("system").innerHTML = `
        cycles: ${o.cycle_count || 0}<br>
        signals: ${o.last_signal_count || 0}<br>
        events: ${o.last_event_count || 0}
    `;

    // DOMINANCE
    const labels = (o.dominance || []).map(d => d.topic);
    const values = (o.dominance || []).map(d => d.dominance);

    if (!dominanceChart) {
        dominanceChart = new Chart(
            document.getElementById("dominanceChart"),
            {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{ data: values }]
                }
            }
        );
    } else {
        dominanceChart.data.labels = labels;
        dominanceChart.data.datasets[0].data = values;
        dominanceChart.update();
    }

    // TREND
    trendData.push(o.last_signal_count || 0);
    if (trendData.length > 20) trendData.shift();

    if (!trendChart) {
        trendChart = new Chart(
            document.getElementById("trendChart"),
            {
                type: "line",
                data: {
                    labels: trendData.map((_, i) => i),
                    datasets: [{ data: trendData }]
                }
            }
        );
    } else {
        trendChart.data.labels = trendData.map((_, i) => i);
        trendChart.data.datasets[0].data = trendData;
        trendChart.update();
    }

    // ANOMALIES
    document.getElementById("anomalies").innerHTML =
        (o.anomalies || []).map(a =>
            `⚠ ${a.type} → ${a.topic}`
        ).join("<br>") || "none";

    // TOP SIGNAL
    if (o.dominance && o.dominance.length > 0) {
        const top = o.dominance[0];
        document.getElementById("top").innerHTML =
            `${top.topic} (${top.dominance})`;
    }

    // FLOW
    document.getElementById("flow").innerHTML =
        (o.dominance || []).map(d =>
            `→ ${d.topic}`
        ).join("<br>");
}

// EVENT INJECTOR
async function sendEvent() {

    const topic = document.getElementById("topic").value;
    const type = document.getElementById("type").value;

    await fetch(`/event?user_id=admin&type=${type}&topic=${topic}`);

}

// INIT
load()
setInterval(load, 2000);

</script>

</body>
</html>
