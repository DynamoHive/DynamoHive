<!DOCTYPE html>
<html>
<head>
    <title>DynamoHive</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h1>DynamoHive</h1>

<img src="/static/dynamohive-logo.png" width="120">

<p>System is running</p>

<hr style="margin:40px; border-color:#333;">

<h2>Live Feed</h2>

<div id="feed">Loading...</div>

<script>
fetch("/posts")
.then(res => res.json())
.then(data => {

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.posts.forEach(p => {
        const div = document.createElement("div");
        div.style.margin = "20px";
        div.innerHTML = "<h3>" + p.title + "</h3>";
        feed.appendChild(div);
    });

})
.catch(() => {
    document.getElementById("feed").innerHTML = "Feed yüklenemedi";
});
</script>

</body>
</html>
