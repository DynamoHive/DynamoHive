<!DOCTYPE html>
<html>
<head>
    <title>DynamoHive</title>
</head>
<body style="background:black; color:white; text-align:center; font-family:Arial;">

<h1>DynamoHive</h1>

<img src="/static/dynamohive-logo.png" width="120">

<p>System is running</p>

<hr style="margin:40px; border-color:#333;">

<h2>Live Feed</h2>

<div id="feed">Loading...</div>

<script>
async function loadFeed() {
    const feed = document.getElementById("feed");

    try {
        // 🔥 DOĞRU ENDPOINT
        const res = await fetch(window.location.origin + "/api/feed");

        if (!res.ok) {
            throw new Error("API error");
        }

        const data = await res.json();

        if (!data.feed || data.feed.length === 0) {
            feed.innerHTML = "No content yet";
            return;
        }

        feed.innerHTML = "";

        data.feed.forEach(p => {
            const div = document.createElement("div");
            div.style.margin = "20px";
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #333";

            div.innerHTML = `
                <h3>${p.title || "No title"}</h3>
                <p style="color:gray; font-size:14px;">
                    ${p.content ? p.content.substring(0, 150) : ""}
                </p>
            `;

            feed.appendChild(div);
        });

    } catch (err) {
        console.error("FETCH ERROR:", err);
        feed.innerHTML = "Feed yüklenemedi";
    }
}

loadFeed();
</script>

</body>
</html>
