<!DOCTYPE html>
<html>
<head>
    <title>DynamoHive</title>
</head>
<body style="background:black; color:white; text-align:center; font-family:Arial;">

<h1>DynamoHive</h1>

<p>System is running</p>

<h2>Live Feed</h2>

<div id="feed">Loading...</div>

<script>
async function loadFeed() {
    const feed = document.getElementById("feed");

    try {
        const res = await fetch("/api/feed");
        const data = await res.json();

        feed.innerHTML = "";

        data.feed.forEach(p => {

            const div = document.createElement("div");
            div.style.margin = "20px";

            div.innerHTML = `
                <h3 onclick="sendEvent('${p.title}')">${p.title}</h3>
                <p>${p.content.substring(0,150)}</p>
            `;

            feed.appendChild(div);
        });

    } catch {
        feed.innerHTML = "Feed yüklenemedi";
    }
}

function sendEvent(topic) {

    console.log("EVENT SENT:", topic);

    fetch("/api/event", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({topic: topic})
    });
}

loadFeed();
</script>

</body>
</html>
